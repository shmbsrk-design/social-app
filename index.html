<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Palestine Social</title>

<style>
body{margin:0;font-family:sans-serif;background:#0a0f14;color:white}
.card{background:#111827;margin:10px;padding:10px;border-radius:10px}
input,button{padding:10px;margin:5px;border-radius:8px;border:none}
button{background:#ce1126;color:white}
</style>
</head>

<body>

<header style="padding:15px;background:#111;text-align:center">
🇵🇸 Palestine Social
<div id="me"></div>
</header>

<!-- LOGIN -->
<div id="login">
<input id="name" placeholder="ادخل اسمك">
<button onclick="login()">دخول</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<input id="text" placeholder="منشور">
<input type="file" id="file">
<button onclick="post()">نشر</button>

<hr>

<input id="msg" placeholder="رسالة">
<button onclick="send()">إرسال</button>

<div id="chat"></div>
<div id="posts"></div>

</div>

<script>

let user = localStorage.getItem("user");

/* ================= LOGIN ONCE ================= */
function login(){

let n=document.getElementById("name").value;
if(!n) return;

user=n;
localStorage.setItem("user",user);

start();
}

/* AUTO LOGIN */
if(user){
start();
}

/* ================= START ================= */
function start(){

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";

document.getElementById("me").innerText="👤 "+user;

loadPosts();
loadChat();

setInterval(loadPosts,4000);
setInterval(loadChat,3000);
}

/* ================= POSTS ================= */
function post(){

let text=document.getElementById("text").value;
let file=document.getElementById("file").files[0];

if(file){
let fd=new FormData();
fd.append("file",file);

fetch("/upload",{method:"POST",body:fd})
.then(r=>r.json())
.then(d=>{
sendPost(text,d.file,d.type);
});
}else sendPost(text,null,null);
}

function sendPost(text,file,type){

fetch("/post",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({user,text,file,type})
}).then(()=>{

document.getElementById("text").value="";
document.getElementById("file").value="";

loadPosts();
});
}

function loadPosts(){
fetch("/posts").then(r=>r.json()).then(d=>{
document.getElementById("posts").innerHTML=
d.map(p=>`
<div class="card">
<b>${p.user}</b><br>
${p.text}<br>
<button>👍 ${p.likes}</button>
<button>👎 ${p.dislikes}</button>
</div>
`).join("");
});
}

/* ================= CHAT ================= */
function send(){
let text=document.getElementById("msg").value;

fetch("/send",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({user,text})
}).then(()=>{
document.getElementById("msg").value="";
loadChat();
});
}

function loadChat(){
fetch("/messages").then(r=>r.json()).then(d=>{
document.getElementById("chat").innerHTML=
d.map(m=>`
<div class="card">
<b>${m.user}</b>: ${m.text}
</div>
`).join("");
});
}

</script>

</body>
</html>
