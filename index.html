<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فلسطين سوشيال 🇵🇸</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f14;
color:white;
}

header{
padding:12px;
text-align:center;
background:linear-gradient(90deg,#000,#006400,#ce1126);
font-weight:bold;
}

.container{
max-width:600px;
margin:auto;
padding:10px;
}

.card{
background:#121826;
padding:10px;
margin:10px 0;
border-radius:12px;
}

input,button{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:8px;
font-size:14px;
}

button{
background:#1f1f1f;
color:white;
cursor:pointer;
}

.small-btn{
width:auto;
padding:5px 10px;
margin:3px;
font-size:12px;
display:inline-block;
}

.post-actions{
margin-top:5px;
}
</style>
</head>

<body>

<header>🇵🇸 فلسطين سوشيال PRO</header>

<div class="container">

<!-- الاسم -->
<input id="name" placeholder="ادخل اسمك">
<button onclick="saveName()">حفظ الاسم</button>

<hr>

<!-- منشور -->
<input id="text" placeholder="اكتب منشور">
<input type="file" id="file">
<button onclick="post()">نشر</button>

<!-- الشات -->
<h3>💬 الرسائل</h3>
<input id="msg" placeholder="رسالة">
<button onclick="send()">إرسال</button>

<div id="chat"></div>
<div id="posts"></div>

</div>

<script>

let user = localStorage.getItem("user") || "زائر";

/* ===== حفظ الاسم ===== */
function saveName(){
user=document.getElementById("name").value;
localStorage.setItem("user",user);
}

/* ===== نشر ===== */
function post(){

let text=document.getElementById("text").value;
let file=document.getElementById("file").files[0];

if(file){
let fd=new FormData();
fd.append("file",file);

fetch("/upload",{method:"POST",body:fd})
.then(r=>r.json())
.then(d=>{
sendPost(text,d.file,d.type);
});
}else sendPost(text,null,null);
}

function sendPost(text,file,type){

fetch("/post",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({user,text,file,type})
}).then(()=>{
document.getElementById("text").value="";
document.getElementById("file").value="";
loadPosts();
});
}

/* ===== عرض المنشورات ===== */
function loadPosts(){

fetch("/posts").then(r=>r.json()).then(data=>{

document.getElementById("posts").innerHTML="";

data.forEach(p=>{

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<b>👤 ${p.user} 🇵🇸</b><br>
<p>${p.text||""}</p>

${p.file ?
`<video controls src="/uploads/${p.file}" style="width:100%;border-radius:10px"></video>`
:""}

<div class="post-actions">
<button class="small-btn" onclick="like(${p.id})">👍 ${p.likes}</button>
<button class="small-btn" onclick="dislike(${p.id})">👎 ${p.dislikes}</button>
</div>
`;

document.getElementById("posts").prepend(div);
});

});
}

/* ===== لايك ===== */
function like(id){
fetch("/like",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id})
}).then(loadPosts);
}

/* ===== ديسلايك ===== */
function dislike(id){
fetch("/dislike",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id})
}).then(loadPosts);
}

/* ===== شات ===== */
function send(){

let text=document.getElementById("msg").value;

fetch("/send",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({user,text})
}).then(()=>{
document.getElementById("msg").value="";
loadChat();
});
}

function loadChat(){
fetch("/messages").then(r=>r.json()).then(data=>{
document.getElementById("chat").innerHTML=
data.map(m=>`
<div class="card">
<b>${m.user} 🇵🇸</b>: ${m.text}
</div>
`).join("");
});
}

/* ===== تشغيل ===== */
loadPosts();
loadChat();

setInterval(loadPosts,5000);
setInterval(loadChat,3000);

</script>

</body>
</html>
