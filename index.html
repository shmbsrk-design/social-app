<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palestine Social PRO</title>

<style>
body{margin:0;font-family:sans-serif;background:#0a0f14;color:white}
header{padding:15px;text-align:center;background:#111}
.card{background:#111827;margin:10px;padding:10px;border-radius:10px}
button{padding:6px;margin:3px}
.online{color:#00ff99}
input{padding:10px;margin:5px;width:90%}
</style>
</head>

<body>

<header>
🇵🇸 Palestine Social PRO
<div id="online"></div>
</header>

<input id="text" placeholder="اكتب منشور">
<input type="file" id="file">
<button onclick="post()">نشر</button>

<div id="list"></div>

<script>

let user = prompt("اسمك");
let lastPost = 0;

/* ONLINE */
setInterval(()=>{
fetch("/online",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({user})
});

fetch("/online")
.then(r=>r.json())
.then(d=>{
document.getElementById("online").innerHTML =
"🟢 Online: " + d.join(", ");
});
},3000);

/* ================= POSTS ================= */

function post(){

let text = document.getElementById("text");
let file = document.getElementById("file");

let formText = text.value;
let formFile = file.files[0];

let f=null,t=null;

/* رفع الملف إذا موجود */
if(formFile){
let fd = new FormData();
fd.append("file",formFile);

fetch("/upload",{method:"POST",body:fd})
.then(r=>r.json())
.then(d=>{
f=d.file;
t=d.type;

sendPost(formText,f,t);
});
}else{
sendPost(formText,null,null);
}
}

/* إرسال المنشور */
function sendPost(text,file,type){

fetch("/post",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({user,text,file,type})
}).then(()=>{

/* ✨ تصفير الحقول بعد النشر */
document.getElementById("text").value = "";
document.getElementById("file").value = "";

load();

});
}

/* ================= LOAD POSTS ================= */

function load(){

fetch("/posts")
.then(r=>r.json())
.then(d=>{

document.getElementById("list").innerHTML="";

d.forEach(p=>{

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<b>${p.user}</b><br>
${p.text||""}<br>

${p.file ?
(p.type && p.type.includes("image") ?
`<img src="/uploads/${p.file}" style="width:100%">`
:
`<video controls src="/uploads/${p.file}" style="width:100%"></video>`
)
:""
}

<br>

<button onclick="like(${p.id})">👍 ${p.likes}</button>
<button onclick="dislike(${p.id})">👎 ${p.dislikes}</button>
<button onclick="del(${p.id})">🗑 حذف</button>
`;

document.getElementById("list").prepend(div);

});
});
}

/* ================= ACTIONS ================= */

function like(id){
fetch("/like",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id,user})})
.then(load);
}

function dislike(id){
fetch("/dislike",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id,user})})
.then(load);
}

function del(id){
let pass = prompt("كلمة السر");
fetch("/delete",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id,pass})})
.then(load);
}

/* INIT */
load();
setInterval(load,3000);

/* NOTIFICATIONS */
if("Notification" in window){
Notification.requestPermission();
}

</script>

</body>
</html>
