<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palestine Social</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0a0f14;
color:white;
}

header{
text-align:center;
padding:15px;
background:linear-gradient(90deg,#000,#006400,#ce1126);
font-weight:bold;
}

input,button{
padding:10px;
margin:5px;
border-radius:10px;
border:none;
}

button{
background:#ce1126;
color:white;
cursor:pointer;
}

.card{
background:#111827;
margin:10px;
padding:12px;
border-radius:12px;
border-left:4px solid #00c853;
}

.actions{
display:flex;
gap:10px;
margin-top:10px;
}

.small{
padding:6px;
font-size:12px;
}
</style>
</head>

<body>

<header>🇵🇸 Palestine Social PRO</header>

<input id="text" placeholder="اكتب منشور">
<input type="file" id="file">
<button onclick="post()">نشر</button>

<div id="list"></div>

<script>

let user = prompt("اسمك");

/* ================= SMART STATE ================= */
let postsCache = new Map();

/* ================= ONLINE UPDATE (خفيف) ================= */
setInterval(()=>{
fetch("/online",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({user})});
},4000);

/* ================= POST ================= */
function post(){

let text=document.getElementById("text").value;
let file=document.getElementById("file").files[0];

if(file){
let fd=new FormData();
fd.append("file",file);

fetch("/upload",{method:"POST",body:fd})
.then(r=>r.json())
.then(d=>{
sendPost(text,d.file,d.type);
});
}else{
sendPost(text,null,null);
}
}

function sendPost(text,file,type){

fetch("/post",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({user,text,file,type})
}).then(r=>r.json())
.then(res=>{
if(res.ok){
document.getElementById("text").value="";
document.getElementById("file").value="";
addPostToUI(res.post);
}
});
}

/* ================= ADD ONLY NEW POST ================= */
function addPostToUI(p){

if(postsCache.has(p.id)) return;

postsCache.set(p.id,p);

let div=document.createElement("div");
div.className="card";

div.id="post-"+p.id;

div.innerHTML=`
<b>${p.user}</b>
<p>${p.text||""}</p>

${p.file ?
(p.type && p.type.includes("image") ?
`<img src="/uploads/${p.file}" style="width:100%">`
:
`<video controls src="/uploads/${p.file}" style="width:100%"></video>`
)
:""
}

<div class="actions">

<button onclick="like(${p.id})">👍 ${p.likes}</button>
<button onclick="dislike(${p.id})">👎 ${p.dislikes}</button>
<button onclick="del(${p.id})">🗑</button>

</div>
`;

document.getElementById("list").prepend(div);
}

/* ================= LOAD ONCE ONLY ================= */
function load(){

fetch("/posts").then(r=>r.json()).then(data=>{

data.forEach(p=>{
if(!postsCache.has(p.id)){
addPostToUI(p);
}
});

});
}

/* ================= ACTIONS ================= */
function like(id){
fetch("/like",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id,user})})
.then(()=>refreshPost(id));
}

function dislike(id){
fetch("/dislike",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id,user})})
.then(()=>refreshPost(id));
}

function del(id){
let pass = prompt("كلمة السر");
fetch("/delete",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id,pass})})
.then(()=>{
let el=document.getElementById("post-"+id);
if(el) el.remove();
postsCache.delete(id);
});
}

/* ================= UPDATE ONLY ONE POST ================= */
function refreshPost(id){
fetch("/posts").then(r=>r.json()).then(data=>{
let p=data.find(x=>x.id===id);
if(!p) return;

let el=document.getElementById("post-"+id);
if(el){
el.querySelector("button").innerHTML="👍 "+p.likes;
}
});
}

/* ================= INIT ================= */
load();

</script>

</body>
</html>
