<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palestine Social</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0a0f14;
color:white;
}

#login{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:#0a0f14;
}

.box{
background:#111827;
padding:20px;
border-radius:15px;
width:80%;
text-align:center;
border:1px solid #1f2a38;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#1c2733;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#ce1126;
color:white;
font-weight:bold;
cursor:pointer;
}

header{
text-align:center;
padding:15px;
background:linear-gradient(90deg,#000,#006400,#ce1126);
font-weight:bold;
}

.menu{
display:flex;
gap:5px;
padding:10px;
}

.menu button{
flex:1;
background:#111827;
border:1px solid #1f2a38;
}

.card{
background:#111827;
margin:10px;
padding:12px;
border-radius:12px;
border-left:4px solid #00c853;
}

.msg{
border-left:4px solid #ce1126;
}

img,video{
width:100%;
border-radius:10px;
margin-top:10px;
}

.small{
padding:6px;
font-size:12px;
border-radius:6px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="box">
<h2>🇵🇸 Palestine Social</h2>

<input id="name" placeholder="اسمك">
<button onclick="enter()">دخول</button>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<header>🇵🇸 Palestine Social</header>

<div class="menu">
<button onclick="show('posts')">المنشورات</button>
<button onclick="show('chat')">الرسائل</button>
<button onclick="changeName()">تغيير الاسم</button>
</div>

<!-- POSTS -->
<div id="posts">

<input id="text" placeholder="اكتب منشور">
<input type="file" id="file">
<button onclick="addPost()">نشر</button>

<div id="list"></div>

</div>

<!-- CHAT -->
<div id="chat" style="display:none">

<input id="msg" placeholder="رسالة">
<button onclick="send()">إرسال</button>

<div id="chatList"></div>

</div>

</div>

<script>

let user="";
let lastPostId=0;
let lastMsgId=0;

/* دخول */
function enter(){
user=document.getElementById("name").value;
if(!user) return;

localStorage.setItem("u",user);

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";

init();
}

if(localStorage.getItem("u")){
user=localStorage.getItem("u");
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
init();
}

/* تغيير الاسم */
function changeName(){
let n=prompt("اسم جديد");
if(n){
user=n;
localStorage.setItem("u",n);
}
}

/* تنقل */
function show(x){
document.getElementById("posts").style.display="none";
document.getElementById("chat").style.display="none";
document.getElementById(x).style.display="block";
}

/* إشعارات */
if("Notification" in window){
Notification.requestPermission();
}

function notify(title,body){
if(Notification.permission==="granted"){
new Notification(title,{body});
}
}

/* ================= POSTS ================= */

async function addPost(){

let text=document.getElementById("text").value;
let file=document.getElementById("file").files[0];

if(!text || text.trim()===""){
alert("لا يمكن نشر منشور فارغ");
return;
}

let f=null,t=null;

if(file){
let fd=new FormData();
fd.append("file",file);

let r=await fetch("/upload",{method:"POST",body:fd});
let d=await r.json();

f=d.file;
t=d.type;
}

let res=await fetch("/post",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({user,text,file:f,type:t})
});

let data=await res.json();

if(!data.ok){
alert(data.error);
return;
}

document.getElementById("text").value="";
loadPosts();
}

/* عرض المنشورات */
function renderPost(p){

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<b>${p.user}</b>
<p>${p.text||""}</p>

${p.file ?
(p.type && p.type.includes("image") ?
`<img src="/uploads/${p.file}">`
:
`<video controls src="/uploads/${p.file}"></video>`
)
:""
}
`;

document.getElementById("list").prepend(div);
}

async function loadPosts(){
let d=await fetch("/posts").then(r=>r.json());

if(d.length>0){
let last=d[d.length-1];
if(last.id!==lastPostId){
lastPostId=last.id;
notify("📰 منشور جديد","تم نشر منشور جديد");
}
}

document.getElementById("list").innerHTML="";
d.forEach(renderPost);
}

/* ================= CHAT ================= */

async function send(){

let m=document.getElementById("msg").value;

if(!m || m.trim()===""){
alert("لا يمكن إرسال رسالة فارغة");
return;
}

let r=await fetch("/send",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({user,text:m})
});

let d=await r.json();

if(!d.ok){
alert(d.error);
return;
}

document.getElementById("msg").value="";
loadChat();
}

async function loadChat(){
let d=await fetch("/messages").then(r=>r.json());

if(d.length>0){
let last=d[d.length-1];
if(last.id!==lastMsgId){
lastMsgId=last.id;
notify("💬 رسالة جديدة", last.user+": "+last.text);
}
}

document.getElementById("chatList").innerHTML =
d.map(m=>`
<div class="card msg">
<b>${m.user}</b><br>
${m.text}
</div>
`).join("");
}

/* INIT */
function init(){
loadPosts();
loadChat();

setInterval(loadChat,3000);
setInterval(loadPosts,5000);
}

</script>

</body>
  </html>
