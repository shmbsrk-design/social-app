<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gaza Social</title>

<link rel="stylesheet" href="style.css">

<script src="/socket.io/socket.io.js"></script>

</head>
<body>

<div id="nameDialog" class="dialog">
    <div class="dialog-content">
        <h2>مرحباً بك</h2>

        <input
            id="usernameInput"
            placeholder="اكتب اسمك"
        >

        <button onclick="saveUsername()">
            دخول
        </button>
    </div>
</div>

<header class="top-bar">
    <h1>🇵🇸 Gaza Social</h1>
    <small>Developed by Mbark Abo Obyda</small>
</header>

<!-- المنشورات -->

<section id="postsPage" class="page active">

    <div class="post-create">

        <textarea
            id="postText"
            placeholder="ماذا يدور في ذهنك؟">
        </textarea>

        <input
            type="file"
            id="postFile"
        >

        <button onclick="createPost()">
            نشر
        </button>

    </div>

    <div id="postsContainer"></div>

</section>

<!-- الرسائل -->

<section id="messagesPage" class="page">

    <div id="messagesContainer"></div>

    <div class="chat-input">

        <input
            id="messageInput"
            placeholder="اكتب رسالة..."
        >

        <button onclick="sendMessage()">
            إرسال
        </button>

    </div>

</section>

<!-- الإعدادات -->

<section id="settingsPage" class="page">

    <div class="card">

        <h3>الاسم</h3>

        <input
            id="settingsName"
            placeholder="الاسم"
        >

    </div>

    <div class="card">

        <label>

            <input
                type="checkbox"
                id="notificationToggle"
                checked
            >

            تفعيل الإشعارات

        </label>

    </div>

    <button onclick="saveSettings()">
        حفظ
    </button>

</section>

<!-- الإشعارات -->

<section id="notificationsPage" class="page">

    <div id="notificationsContainer"></div>

</section>

<nav class="bottom-nav">

    <button onclick="showPage('postsPage')">
        المنشورات
    </button>

    <button onclick="showPage('messagesPage')">
        الرسائل
    </button>

    <button onclick="showPage('settingsPage')">
        الإعدادات
    </button>

    <button onclick="showPage('notificationsPage')">
        الإشعارات
    </button>

</nav>

<script src="app.js"></script>

</body>
</html>
